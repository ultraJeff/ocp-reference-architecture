apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: myapp-api
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: api
spec:
  host: myapp-api.apps.example.com
  to:
    kind: Service
    name: myapp-api
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
